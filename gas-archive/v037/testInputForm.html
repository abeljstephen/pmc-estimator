<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Task Estimates (Test)</title>
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background: #f5f7fa;
            margin: 0;
            padding: 20px;
        }
        .simulator-container {
            max-width: 800px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 6px;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
            padding: 20px;
        }
        h1 {
            font-size: 24px;
            color: #2c5282;
            margin-bottom: 20px;
        }
        .task-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .task-row {
            display: flex;
            gap: 10px;
            align-items: center;
            padding: 10px;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
        }
        .task-row input[type="text"], .task-row input[type="number"] {
            padding: 5px;
            border: 1px solid #2c5282;
            border-radius: 3px;
            font-size: 12px;
            width: 120px;
        }
        .task-row input[type="checkbox"] {
            margin-left: 10px;
        }
        .task-row label {
            font-size: 12px;
            color: #333;
        }
        .error-message {
            color: red;
            font-size: 12px;
            margin-top: 5px;
        }
        .button-container {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        button {
            padding: 8px 15px;
            background-color: #2c5282;
            color: white;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            font-size: 12px;
        }
        button:hover {
            background-color: #1a365d;
        }
        #loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            font-size: 16px;
            color: #333;
        }
    </style>
</head>
<body>
    <div id="loading-overlay">Submitting, please wait...</div>
    <div class="simulator-container">
        <h1>Submit Task Estimates (Test)</h1>
        <div class="task-form" id="task-form">
            <!-- Task rows will be added dynamically -->
        </div>
        <div class="button-container">
            <button onclick="addTaskRow()">Add Task</button>
            <button onclick="submitTasks()">Submit</button>
        </div>
        <div id="error-message" class="error-message"></div>
    </div>

    <script>
        var tasks = <?!= JSON.stringify(prefillData || []) ?>;

        function initialize() {
            const form = document.getElementById('task-form');
            if (tasks.length === 0) {
                addTaskRow();
            } else {
                tasks.forEach(task => addTaskRow(task));
            }
        }

        function addTaskRow(task = {}) {
            const form = document.getElementById('task-form');
            const row = document.createElement('div');
            row.className = 'task-row';
            row.innerHTML = `
                <input type="text" placeholder="Task Name" value="${task.taskName || ''}">
                <input type="text" placeholder="Units (e.g., hours)" value="${task.units || ''}">
                <input type="number" placeholder="Best Case" value="${task.bestCase || ''}">
                <input type="number" placeholder="Most Likely" value="${task.mostLikely || ''}">
                <input type="number" placeholder="Worst Case" value="${task.worstCase || ''}">
                <input type="checkbox" ${task.selectedForPlot ? 'checked' : ''}>
                <label>Plot</label>
            `;
            form.appendChild(row);
        }

        function validateTasks() {
            const rows = document.querySelectorAll('.task-row');
            const tasksData = [];
            let selectedCount = 0;
            let error = '';

            rows.forEach((row, index) => {
                const inputs = row.querySelectorAll('input');
                const taskName = inputs[0].value.trim();
                const units = inputs[1].value.trim();
                const bestCase = parseFloat(inputs[2].value);
                const mostLikely = parseFloat(inputs[3].value);
                const worstCase = parseFloat(inputs[4].value);
                const selectedForPlot = inputs[5].checked;

                if (!taskName) error += `Task ${index + 1}: Task name is required.\n`;
                if (!units) error += `Task ${index + 1}: Units are required.\n`;
                if (isNaN(bestCase) || !isFinite(bestCase) || bestCase < 0) error += `Task ${index + 1}: Best Case must be a valid non-negative number.\n`;
                if (isNaN(mostLikely) || !isFinite(mostLikely) || mostLikely < 0) error += `Task ${index + 1}: Most Likely must be a valid non-negative number.\n`;
                if (isNaN(worstCase) || !isFinite(worstCase) || worstCase < 0) error += `Task ${index + 1}: Worst Case must be a valid non-negative number.\n`;
                if (bestCase > mostLikely || mostLikely > worstCase) error += `Task ${index + 1}: Must follow Best Case ≤ Most Likely ≤ Worst Case.\n`;
                const range = worstCase - bestCase;
                const minRange = mostLikely * 0.001;
                if (range < minRange) error += `Task ${index + 1}: Estimate range too small.\n`;
                if (bestCase === mostLikely && mostLikely === worstCase) error += `Task ${index + 1}: Estimates cannot all be equal.\n`;
                if (selectedForPlot) selectedCount++;

                tasksData.push({
                    taskName: taskName.replace(/&/g, 'and').replace(/\s+/g, '_').replace(/[",<>\/\\]/g, ''),
                    units: units,
                    bestCase: bestCase,
                    mostLikely: mostLikely,
                    worstCase: worstCase,
                    selectedForPlot: selectedForPlot
                });
            });

            if (selectedCount !== 1) error += 'Exactly one task must be selected for plotting.\n';

            document.getElementById('error-message').textContent = error;
            return { valid: !error, tasks: tasksData };
        }

        function submitTasks() {
            const { valid, tasks } = validateTasks();
            if (!valid) return;

            document.getElementById('loading-overlay').style.display = 'flex';
            const webAppUrl = '<?!= ScriptApp.getService().getUrl() ?>';
            google.script.run
                .withSuccessHandler(function(response) {
                    document.getElementById('loading-overlay').style.display = 'none';
                    alert(`Success! Spreadsheet: ${response.sheetUrl}\nInteractive Plots: ${response.plotUrl}`);
                    window.location.href = response.plotUrl;
                })
                .withFailureHandler(function(error) {
                    document.getElementById('loading-overlay').style.display = 'none';
                    document.getElementById('error-message').textContent = `Error: ${error.message}`;
                })
                .doPostTest({ parameter: { data: JSON.stringify(tasks) } });
        }

        document.addEventListener('DOMContentLoaded', initialize);
    </script>
</body>
</html>
